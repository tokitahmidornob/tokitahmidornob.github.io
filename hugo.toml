baseURL = 'https://tokitahmidornob.github.io/'
title = 'Toki Tahmid | Digital Portfolio'
theme = 'blowfish'

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceSwitcher = true
  showScrollToTop = true

[params.header]
  layout = "fixed" # This creates the beautiful blurred glass effect when you scroll

[build]
  writeStats = true

[params.author]
  name = "Toki Tahmid"
  image = "profile.jpg"
  headline = "Mechanical Engineering Student | NASA Citizen Scientist | Researcher"
  bio = "Aspiring Aerospace Engineer focused on the intersection of mechanical systems and celestial discovery."
  links = [
    { email = "mailto:tokitahmidornob@gmail.com" },
    { github = "https://github.com/tokitahmidornob" },
    { linkedin = "https://linkedin.com/in/your-profile" },
  ]

[menu]
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    identifier = "experience"
    name = "Experience"
    url = "/experience/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params.list]
  cardView = true