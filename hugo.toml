baseURL = 'https://tokitahmidornob.github.io/'
title = 'Toki Tahmid | Digital Portfolio'
theme = 'blowfish'
description = "Mechanical Engineering Portfolio of Toki Tahmid. Discover aerospace research, NASA asteroid discoveries, and the H.O.L.M.E.S. Initiative."
images = ["/profile.jpg"]

[params]
  colorScheme = "aurora"
  defaultAppearance = "dark"
  showAppearanceSwitcher = true
  showScrollToTop = true

[params.header]
  layout = "fixed"
  backdropBlur = true

[build]
  writeStats = true

[params.author]
  name = "Toki Tahmid"
  image = "profile.jpg"
  headline = "Mechanical Engineering Student | NASA Citizen Scientist | Researcher"
  bio = "Aspiring Aerospace Engineer focused on the intersection of mechanical systems and celestial discovery."
  links = [
    { github = "https://github.com/tokitahmidornob" },
    { linkedin = "https://www.linkedin.com/in/toki-tahmid-ornob-761668340/" },
    { "file-pdf" = "/resume.pdf" }
  ]

[menu]
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    identifier = "experience"
    name = "Experience"
    url = "/experience/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params.list]
  cardView = true

[[menu.main]]
  name = "Articles"
  url = "/articles/"
  weight = 40
  
[[menu.main]]
  name = "Gallery"
  url = "/gallery/"
  weight = 45

[[menu.main]]
  name = "Resume"
  url = "/resume.pdf"
  weight = 50