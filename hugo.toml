baseURL = 'https://tokitahmidornob.github.io/'
title = 'Toki Tahmid | Digital Portfolio'
theme = 'blowfish'

[build]
  writeStats = true

[params]
  # Global SEO & Preview Envelopes
  description = "Mechanical Engineering Portfolio of Toki Tahmid. Discover aerospace research, NASA asteroid discoveries, and the H.O.L.M.E.S. Initiative."
  images = ["/image_8bac44.png"]
  keyword = "Toki Tahmid, Mechanical Engineering, IUBAT, NASA Citizen Scientist, Aerospace, MPT System, Bangladesh"
  robots = "index, follow"
  
  # Theme Settings
  colorScheme = "aurora"
  defaultAppearance = "dark"
  showAppearanceSwitcher = true
  showScrollToTop = true
  customJS = ["js/custom.js"]
  math = true

[params.header]
  layout = "fixed"
  backdropBlur = true

[params.list]
  cardView = true

[params.author]
  name = "Toki Tahmid"
  image = "image_8bac44.png"
  headline = "Mechanical Engineering Student | NASA Citizen Scientist | Researcher"
  bio = "Aspiring Aerospace Engineer focused on the intersection of mechanical systems and celestial discovery."
  links = [
    { github = "https://github.com/tokitahmidornob" },
    { linkedin = "https://www.linkedin.com/in/toki-tahmid-ornob-761668340/" },
    { "file-pdf" = "/resume.pdf" }
  ]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# --- ALL MENU ITEMS GROUPED TOGETHER BELOW ---
