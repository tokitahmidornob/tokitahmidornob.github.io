<div class="contact-container" style="margin-top: 2.5rem;">
  <form action="https://formspree.io/f/maqpkqna" method="POST" class="glass-form">
    <div class="form-group">
      <label style="color: #00d4ff; font-weight: bold;">> Originating Identity</label>
      <input type="text" name="name" style="width: 100%; background: rgba(0,0,0,0.5); color: white; border: 1px solid #00d4ff; padding: 10px; margin-bottom: 15px;" placeholder="Name / Organization" required>
    </div>
    <div class="form-group">
      <label style="color: #00d4ff; font-weight: bold;">> Return Channel</label>
      <input type="email" name="email" style="width: 100%; background: rgba(0,0,0,0.5); color: white; border: 1px solid #00d4ff; padding: 10px; margin-bottom: 15px;" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label style="color: #00d4ff; font-weight: bold;">> Transmission Payload</label>
      <textarea name="message" rows="6" style="width: 100%; background: rgba(0,0,0,0.5); color: white; border: 1px solid #00d4ff; padding: 10px; margin-bottom: 15px;" placeholder="Type your dispatch here..." required></textarea>
    </div>
    <button type="submit" style="background: transparent; color: #00d4ff; border: 2px solid #00d4ff; padding: 10px 20px; cursor: pointer; width: 100%; font-weight: bold;">INITIATE TRANSMISSION</button>
  </form>
</div>
