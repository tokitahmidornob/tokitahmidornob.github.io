<div class="contact-container" style="margin-top: 2rem;">
  <form action="{{ .Get "url" }}" method="POST" class="glass-form quantum-reveal">
    <div class="form-group">
      <label for="name">> Originating Identity</label>
      <input type="text" id="name" name="name" placeholder="Name / Organization" required>
    </div>
    <div class="form-group">
      <label for="email">> Return Channel</label>
      <input type="email" id="email" name="email" placeholder="email@example.com" required>
    </div>
    <div class="form-group">
      <label for="message">> Transmission Payload</label>
      <textarea id="message" name="message" rows="6" placeholder="Type your dispatch here..." required></textarea>
    </div>
    <button type="submit" class="transmit-btn">Initiate Transmission</button>
  </form>
</div>
